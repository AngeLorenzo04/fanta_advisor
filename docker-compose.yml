version: '3.8'

services:
  # 1. Message Broker (Redis) - Keep for future asynchronous Next.js jobs if needed
  redis:
    image: redis:7-alpine
    container_name: fanta-redis-broker
    ports:
      - "6379:6379"

  # 2. Local Dev Database (PostgreSQL) - Required by Next.js and Prisma
  db:
    image: postgres:16-alpine
    container_name: fanta-postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fanta_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
